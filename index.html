
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 공주교대 동문화합의 날 배구대회</title>
  <style>
    :root {
      --green:#0f7a43;
      --green-2:#0b5e34;
      --mint:#eaf8ef;
      --mint-2:#d6f1e0;
      --ink:#163025;
      --muted:#678073;
      --line:#d9ebe0;
      --cream:#fffdf6;
      --yellow:#fff3c5;
      --orange:#ff9f43;
      --red:#e34c4c;
      --blue:#3178d4;
      --white:#ffffff;
      --shadow:0 12px 34px rgba(13, 77, 42, .12);
      --radius:20px;
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      margin:0; background:linear-gradient(180deg,#f3fbf6 0,#f8faf8 30%,#fff 100%);
      color:var(--ink); font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;
      min-height:100vh;
    }
    button,input,select { font:inherit; }
    button { cursor:pointer; }
    .app { max-width:1240px; margin:0 auto; padding:18px 18px 58px; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px;
    }
    .brand { display:flex; align-items:center; gap:12px; min-width:0; }
    .mark {
      width:52px; height:52px; overflow:hidden; border-radius:18px; background:linear-gradient(145deg,var(--green),#25a860);
      display:grid; place-items:center; box-shadow:0 8px 16px rgba(15,122,67,.2); flex:0 0 auto;
    }
    .mark img {
      display:block; width:100%; height:100%; object-fit:cover; background:#fff;
    }
    .mark.has-logo { background:#fff; }
    .brand h1 { margin:0; font-size:clamp(17px,3vw,25px); letter-spacing:-.04em; }
    .brand p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .right-tools { display:flex; gap:8px; align-items:center; }
    .button {
      border:0; border-radius:12px; padding:10px 14px; font-weight:800; font-size:13px; transition:.18s ease;
      display:inline-flex; align-items:center; gap:7px; justify-content:center;
    }
    .button:hover { transform:translateY(-1px); }
    .button.primary { color:#fff; background:var(--green); box-shadow:0 8px 14px rgba(15,122,67,.17); }
    .button.soft { color:var(--green-2); background:var(--mint); }
    .button.line { color:var(--green-2); background:#fff; border:1px solid var(--line); }
    .button.warn { color:#8a5b00; background:var(--yellow); }
    .button.danger { color:#b62d2d; background:#fff0f0; }
    .button[disabled] { opacity:.48; pointer-events:none; }
    .hero {
      overflow:hidden; position:relative; border-radius:28px; padding:30px; margin-bottom:16px;
      color:#fff; background:
        radial-gradient(circle at 90% 14%,rgba(255,255,255,.24),transparent 15%),
        radial-gradient(circle at 8% 92%,rgba(255,255,255,.13),transparent 23%),
        linear-gradient(135deg,#0d6539 0%,#0f8e4d 51%,#0a6336 100%);
      box-shadow:var(--shadow);
    }
    .hero:after {
      content:""; position:absolute; width:250px; height:250px; right:-86px; bottom:-150px; border:1px solid rgba(255,255,255,.16);
      border-radius:50%;
    }
    .hero-grid { position:relative; z-index:1; display:grid; grid-template-columns:1fr auto; gap:22px; align-items:end; }
    .eyebrow { font-size:12px; font-weight:900; letter-spacing:.14em; opacity:.8; }
    .hero h2 { margin:7px 0 8px; font-size:clamp(28px,4vw,42px); letter-spacing:-.06em; line-height:1.08; }
    .hero p { margin:0; opacity:.9; font-weight:700; font-size:14px; }
    .hero-meta { display:flex; flex-wrap:wrap; gap:7px; margin-top:18px; }
    .pill { display:inline-flex; gap:5px; align-items:center; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.16); font-weight:800; font-size:12px; }
    .hero-score { text-align:right; padding-bottom:2px; }
    .hero-score b { display:block; font-size:42px; line-height:1; letter-spacing:-.06em; }
    .hero-score span { font-size:12px; font-weight:800; opacity:.85; }
    .tabs {
      display:flex; overflow:auto; gap:7px; background:#fff; padding:7px; border:1px solid var(--line);
      border-radius:16px; box-shadow:0 7px 18px rgba(21,80,47,.05); margin-bottom:18px;
    }
    .tab {
      flex:0 0 auto; border:0; background:transparent; color:#648071; padding:10px 14px; border-radius:11px;
      font-weight:900; font-size:14px;
    }
    .tab.active { background:var(--green); color:#fff; box-shadow:0 6px 11px rgba(15,122,67,.18); }
    .toolbar { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    .toolbar-left,.toolbar-right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .section-title { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:0 0 13px; }
    .section-title h3 { margin:0; font-size:20px; letter-spacing:-.04em; }
    .section-title small { color:var(--muted); font-weight:700; }
    .grid { display:grid; gap:14px; }
    .grid.cards { grid-template-columns:repeat(4,minmax(0,1fr)); }
    .grid.two { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .grid.three { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .card {
      background:#fff; border:1px solid var(--line); border-radius:var(--radius); box-shadow:0 8px 22px rgba(22,76,47,.055);
      padding:18px;
    }
    .metric { padding:16px; min-height:104px; }
    .metric small { display:block; color:var(--muted); font-size:12px; font-weight:900; }
    .metric b { display:block; font-size:30px; margin-top:7px; letter-spacing:-.06em; }
    .metric .mini { font-size:12px; color:var(--green); font-weight:800; margin-top:3px; }

    /* 경기 구분·경기장 색상 체계 */
    .match-card {
      --division:#168746;
      --division-soft:#effaf2;
      --venue:#5d7668;
      --venue-soft:#f1f6f2;
      position:relative;
      overflow:hidden;
      border-left:8px solid var(--division);
      background:linear-gradient(135deg,var(--division-soft) 0%,#fff 52%);
      box-shadow:0 8px 18px rgba(22,76,47,.05);
    }
    .match-card.mens { --division:#1976c9; --division-soft:#edf7ff; }
    .match-card.womens { --division:#d34d8a; --division-soft:#fff1f7; }
    .match-card.mixed { --division:#149b7b; --division-soft:#ecfcf6; }

    .match-card:before {
      content:"";
      position:absolute;
      width:86px; height:86px;
      border-radius:50%;
      right:-35px; top:-44px;
      background:var(--division);
      opacity:.08;
      pointer-events:none;
    }
    .match-card .tag.round {
      color:var(--division);
      background:var(--division-soft);
      border:1px solid color-mix(in srgb, var(--division) 18%, white);
    }
    .match-card .scoreline { color:var(--division); }
    .venue-chip {
      display:inline-flex;
      align-items:center;
      gap:4px;
      max-width:170px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      padding:4px 7px;
      border-radius:8px;
      color:var(--venue);
      background:var(--venue-soft);
      font-weight:950;
    }
    .venue-hongseong { --venue:#2667b8; --venue-soft:#eaf2ff; }
    .venue-naepojung { --venue:#1c8bc6; --venue-soft:#e9f7ff; }
    .venue-naepoelementary { --venue:#b56c12; --venue-soft:#fff5e5; }
    .venue-hongbukjung { --venue:#7357bc; --venue-soft:#f1edff; }
    .venue-hongjuelementary { --venue:#c7477e; --venue-soft:#fff0f6; }
    .venue-hanulelementary { --venue:#af7006; --venue-soft:#fff7df; }
    .venue-hongbukelementary { --venue:#10836c; --venue-soft:#e8fbf5; }

    .subtab.division-mens.active { background:#1976c9; border-color:#1976c9; }
    .subtab.division-womens.active { background:#d34d8a; border-color:#d34d8a; }
    .subtab.division-mixed.active { background:#149b7b; border-color:#149b7b; }
    .match-card {
      width:100%; text-align:left; border:1px solid var(--line); background:#fff; border-radius:18px; padding:14px;
      transition:.18s ease; color:inherit;
    }
    .match-card:hover { transform:translateY(-2px); border-color:#9bd3af; box-shadow:0 11px 22px rgba(11,94,52,.09); }
    .match-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px; }
    .tag { display:inline-flex; align-items:center; border-radius:999px; padding:4px 8px; font-size:11px; font-weight:900; }
    .tag.live { color:#d94a20; background:#fff0eb; }
    .tag.pending { color:#526f60; background:#f0f5f1; }
    .tag.done { color:#0d6c3a; background:#e4f7eb; }
    .tag.round { color:#075c33; background:#ddf2e5; }
    .match-teamrow { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; }
    .team { font-weight:950; letter-spacing:-.03em; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .team.right { text-align:right; }
    .vs { font-size:12px; color:#9aaea1; font-weight:900; }
    .match-bottom { display:flex; justify-content:space-between; gap:8px; margin-top:12px; padding-top:10px; border-top:1px dashed var(--line); color:var(--muted); font-weight:800; font-size:11px; }
    .scoreline { color:var(--green-2); font-weight:950; }
    .empty { text-align:center; color:var(--muted); padding:35px 14px; background:#fff; border:1px dashed #bed9c8; border-radius:18px; font-weight:800; }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#b0c2b7; display:inline-block; }
    .status-dot.live { background:#ff7a45; box-shadow:0 0 0 4px rgba(255,122,69,.12); }
    .status-dot.done { background:#1aae60; }
    .subtabs { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
    .subtab {
      border:1px solid var(--line); background:#fff; color:#62766a; font-weight:900; border-radius:999px; padding:8px 11px; font-size:12px;
    }
    .subtab.active { color:#fff; background:var(--green); border-color:var(--green); }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:15px; }
    table { width:100%; border-collapse:collapse; min-width:620px; background:#fff; }
    th { background:var(--mint); color:var(--green-2); font-size:12px; font-weight:950; padding:11px 10px; text-align:center; white-space:nowrap; }
    td { border-top:1px solid #edf4ef; padding:10px; text-align:center; font-size:13px; font-weight:750; }
    td.team-cell { text-align:left; font-weight:950; }
    tr.rank-1 td { background:#f7fff8; }
    .rank-badge { display:inline-grid; place-items:center; width:25px; height:25px; border-radius:9px; font-weight:950; background:#edf4ef; color:var(--green-2); }
    .rank-badge.one { background:#ffefae; color:#745500; }
    .bracket-wrap { overflow:auto; padding-bottom:4px; }
    .bracket {
      min-width:820px; display:grid; grid-template-columns:repeat(3,1fr); gap:18px; align-items:start;
      padding:6px;
    }
    .round-col { min-height:280px; }
    .round-name { text-align:center; margin:0 0 10px; padding:8px; color:#fff; background:var(--green); border-radius:10px; font-size:13px; font-weight:950; }
    .round-list { display:flex; flex-direction:column; gap:12px; }
    .bracket-card {
      width:100%; background:#fff; border:1px solid var(--line); border-radius:14px; padding:11px; text-align:left; color:inherit;
    }
    .bracket-card:hover { border-color:#8bc9a2; }
    .bracket-teams { display:grid; gap:6px; }
    .bracket-team { display:flex; justify-content:space-between; gap:8px; padding:5px 7px; border-radius:8px; font-size:13px; font-weight:900; }
    .bracket-team.winner { color:#fff; background:var(--green); }
    .bracket-meta { display:flex; justify-content:space-between; gap:7px; margin-top:9px; color:var(--muted); font-weight:800; font-size:10px; }
    .rule-list { margin:0; padding:0; list-style:none; display:grid; gap:10px; }
    .rule-list li { border-left:4px solid var(--green); padding:10px 12px; background:#fbfffc; border-radius:0 10px 10px 0; }
    .rule-list b { display:block; margin-bottom:4px; }
    .footer { margin-top:28px; text-align:center; color:#8ba094; font-size:12px; font-weight:700; }
    .overlay {
      position:fixed; inset:0; z-index:50; background:rgba(13,31,21,.45); backdrop-filter:blur(4px); display:none;
      align-items:flex-end; justify-content:center; padding:16px;
    }
    .overlay.show { display:flex; }
    .modal {
      width:min(720px,100%); max-height:92vh; overflow:auto; background:#fff; border-radius:25px; box-shadow:0 24px 80px rgba(0,0,0,.3);
      padding:20px;
    }
    .modal-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .modal-head h3 { margin:0; font-size:21px; letter-spacing:-.04em; }
    .modal-head p { margin:5px 0 0; color:var(--muted); font-size:13px; font-weight:700; }
    .x { border:0; background:#eef5f0; color:var(--green-2); border-radius:10px; width:36px; height:36px; font-size:19px; font-weight:900; }
    .score-panel { background:linear-gradient(180deg,#f2fbf5,#fff); border:1px solid var(--line); border-radius:18px; padding:15px; }
    .set-block { background:#fff; border:1px solid var(--line); border-radius:16px; padding:12px; margin-top:10px; }
    .set-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .set-title { color:var(--green-2); font-size:14px; font-weight:950; }
    .set-winner-badge { display:inline-flex; align-items:center; justify-content:center; min-width:86px; padding:7px 10px; border-radius:999px; background:#f0f5f1; color:#5f7468; font-size:12px; font-weight:950; }
    .set-winner-badge.done { background:#e4f7eb; color:var(--green-2); }
    .set-winner-badge.live { background:#fff3c5; color:#8a5b00; }
    .set-winner-badge.skipped { background:#f0f4f1; color:#708177; }
    .preview-chip.skipped { color:#708177; background:#f0f4f1; border-color:#e0e8e2; }
    .set-teams { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; }
    .set-team-name { font-size:18px; font-weight:950; letter-spacing:-.03em; }
    .set-team-name.right { text-align:right; }
    .set-vs-mini { font-size:11px; color:#95a79d; font-weight:900; text-align:center; }
    .score-input-grid { display:grid; grid-template-columns:1fr 50px 50px 1fr; gap:10px; align-items:center; margin:10px 0; }
    .set-label { text-align:center; font-size:12px; font-weight:950; color:var(--green-2); }
    .score-input {
      width:100%; border:1px solid #a8d2b5; border-radius:10px; padding:9px 6px; text-align:center; font-size:18px; font-weight:950; outline:none;
    }
    .score-input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(15,122,67,.12); }
    .score-preview { display:flex; flex-wrap:wrap; gap:8px; margin-top:13px; }
    .preview-chip { background:#fff; border:1px solid var(--line); padding:7px 9px; border-radius:10px; font-size:12px; font-weight:900; }
    .preview-chip.done { color:var(--green-2); background:#effaf2; }
    .preview-chip.live { color:#a25c00; background:#fff9e9; }
    .info-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin:14px 0; }
    .info-box { background:#f7faf8; border:1px solid var(--line); border-radius:12px; padding:10px; }
    .info-box small { display:block; color:var(--muted); font-size:10px; font-weight:900; margin-bottom:4px; }
    .info-box b { font-size:13px; }
    .point-detail { display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
    .point-detail .point-team { font-size:12px; font-weight:950; color:var(--green-2); }
    .point-detail .point-value { color:var(--green); font-size:15px; font-weight:950; }
    .point-detail .point-zero { color:#8aa096; }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:17px; flex-wrap:wrap; }
    .login-note { color:var(--muted); font-size:13px; font-weight:700; line-height:1.55; }
    .field-label { display:block; color:var(--green-2); font-size:12px; font-weight:950; margin:13px 0 6px; }
    .text-input { width:100%; padding:12px; border-radius:11px; border:1px solid var(--line); outline:none; }
    .text-input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(15,122,67,.10); }
    .toast {
      position:fixed; left:50%; bottom:18px; transform:translateX(-50%) translateY(20px); z-index:80; opacity:0;
      min-width:260px; max-width:calc(100vw - 36px); background:#183c2a; color:#fff; border-radius:14px; padding:12px 15px;
      box-shadow:0 12px 30px rgba(0,0,0,.22); font-size:13px; font-weight:800; transition:.22s ease; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .loading { padding:70px 15px; text-align:center; color:var(--green-2); font-weight:900; }
    .spinner { width:28px; height:28px; border:3px solid #cbe8d5; border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 11px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .hide { display:none!important; }
    @media (max-width:820px) {
      .grid.cards { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .grid.two,.grid.three { grid-template-columns:1fr; }
      .hero-grid { grid-template-columns:1fr; }
      .hero-score { text-align:left; }
    }
    @media (max-width:580px) {
      /* 휴대폰 대시보드: 첫 화면에서 경기 목록을 바로 볼 수 있게 압축 */
      .hero { padding:20px 18px 18px; min-height:0; margin-bottom:12px; }
      .hero h2 { font-size:28px; line-height:1.13; margin:6px 0 6px; }
      .hero p { font-size:12px; }
      .eyebrow { font-size:10px; letter-spacing:.10em; }
      .hero-meta { margin-top:12px; gap:5px; }
      .pill { padding:5px 7px; font-size:10px; }
      .hero-score {
        position:absolute; right:18px; bottom:16px; text-align:right;
        display:flex; align-items:baseline; gap:5px;
      }
      .hero-score b { font-size:26px; }
      .hero-score span { font-size:10px; }
      .tabs { margin-bottom:12px; padding:5px; gap:4px; }
      .tab { padding:8px 10px; font-size:12px; }
      .dashboard-match-list .match-card { min-height:112px; }
      .dashboard-more { width:100%; margin-top:10px; }
      .dashboard-recent { display:none; }
    }
    @media (max-width:580px) {
      .app { padding:12px 12px 42px; }
      .topbar { align-items:flex-start; }
      .right-tools { flex-wrap:wrap; justify-content:flex-end; }
      .brand p { display:none; }
      .hero { padding:23px 20px; border-radius:22px; }
      .tab { padding:9px 11px; font-size:13px; }
      .score-input-grid { grid-template-columns:1fr 47px 47px 1fr; gap:7px; }
      .info-grid { grid-template-columns:1fr 1fr; }
      .grid.cards { gap:10px; }
      .metric { padding:13px; min-height:95px; }
    }
  
    /* 카드 구분 색상은 기본 카드 스타일보다 뒤에 배치해 확실히 적용 */
    .match-card.mens,
    .match-card.womens,
    .match-card.mixed {
      position:relative;
      overflow:hidden;
      border-left-width:6px;
      border-left-style:solid;
    }
    .match-card.mens {
      --division:#1976c9; --division-soft:#edf7ff;
      border-left-color:#1976c9;
      background:linear-gradient(135deg,#edf7ff 0%,#fff 56%);
    }
    .match-card.womens {
      --division:#d34d8a; --division-soft:#fff1f7;
      border-left-color:#d34d8a;
      background:linear-gradient(135deg,#fff1f7 0%,#fff 56%);
    }
    .match-card.mixed {
      --division:#149b7b; --division-soft:#ecfcf6;
      border-left-color:#149b7b;
      background:linear-gradient(135deg,#ecfcf6 0%,#fff 56%);
    }
    .match-card.mens:before,
    .match-card.womens:before,
    .match-card.mixed:before {
      content:"";
      position:absolute;
      width:86px; height:86px;
      border-radius:50%;
      right:-35px; top:-44px;
      background:var(--division);
      opacity:.09;
      pointer-events:none;
    }
    .match-card .tag.round {
      color:var(--division);
      background:var(--division-soft);
      border:1px solid color-mix(in srgb, var(--division) 18%, white);
    }
    .match-card .scoreline { color:var(--division); }
    .match-card .match-bottom {
      align-items:center;
      flex-wrap:wrap;
      row-gap:6px;
    }
    .match-card .match-bottom > span:last-child { margin-left:auto; }

  
    /* 조별 순위 카드 색상 구분 */
    .standing-card {
      position:relative;
      overflow:hidden;
      border-top:7px solid var(--stand-accent,#168746);
      background:linear-gradient(180deg,var(--stand-soft,#f7fbf8) 0%, #fff 26%);
      box-shadow:0 8px 20px rgba(22,76,47,.05);
    }
    .standing-card .table-wrap {
      background:#fff;
      overflow-x:visible;
    }
    .standing-card table {
      min-width:0;
      table-layout:fixed;
    }
    .standing-card th,
    .standing-card td {
      padding:8px 4px;
      font-size:clamp(11px,2.9vw,13px);
    }

    standingFilter: '전체',
    standingGroupFilter: '전체',
    tournamentFilter: '남자',
    adminKey: localStorage.getItem('gnueVolleyAdminKey') || '',
    selectedMatchId: null,
    loading: false
  };

  if (viewerMode) {
    document.body.classList.add('viewer-mode');
  }

  const $ = (selector, root=document) => root.querySelector(selector);
  const $$ = (selector, root=document) => [...root.querySelectorAll(selector)];

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
  }

  function text(value, fallback='–') {
    const out = String(value ?? '').trim();
    return out || fallback;
  }

  function number(value) {
    return value === null || value === '' || value === undefined ? null : Number(value);
  }

  function score(value) {
    return value === null || value === '' || value === undefined ? '–' : value;
  }

  function statusClass(status) {
    return status === '종료' ? 'done' : status === '진행중' ? 'live' : 'pending';
  }

  function statusLabel(status) {
    return status || '예정';
  }

  function getSetWinner(aRaw, bRaw, target) {
    const a = number(aRaw), b = number(bRaw);
    if (!Number.isFinite(a) || !Number.isFinite(b)) return '';
    if (Math.max(a,b) < target || Math.abs(a-b) < 2) return '';
    return a > b ? 'A' : 'B';
  }

  function calcMatchFromInputs(match) {
    const s = {
      s1a: number($('#s1a')?.value), s1b: number($('#s1b')?.value),
      s2a: number($('#s2a')?.value), s2b: number($('#s2b')?.value),
      s3a: number($('#s3a')?.value), s3b: number($('#s3b')?.value),
    };
    const wins = [
      getSetWinner(s.s1a,s.s1b,21),
      getSetWinner(s.s2a,s.s2b,21),
      getSetWinner(s.s3a,s.s3b,15)
    ];
    const a = wins.filter(v => v === 'A').length;
    const b = wins.filter(v => v === 'B').length;
    const hasScore = Object.values(s).some(v => Number.isFinite(v));
    let status = hasScore ? '진행중' : '예정';
    let winner = '';
    let pointsA = '', pointsB = '';
    if (a === 2) {
      status='종료'; winner=match.teamA; pointsA=b===0?3:2; pointsB=b===0?0:1;
    } else if (b === 2) {
      status='종료'; winner=match.teamB; pointsA=a===0?0:1; pointsB=a===0?3:2;
    }
    return { ...s, setWinners:wins, setWinsA:a, setWinsB:b, status,winner,pointsA,pointsB };
  }

  function setScoreLine(match) {
    const pairs = [
      [match.set1A, match.set1B],
      [match.set2A, match.set2B],
      [match.set3A, match.set3B],
    ].filter(([a,b]) => a !== null && a !== '' && b !== null && b !== '');
    if (!pairs.length) return '';
    return pairs.map(([a,b]) => `${a}:${b}`).join(' · ');
  }

  function pointDetailHtml(teamA, pointA, teamB, pointB) {
    const a = pointA === null || pointA === '' || pointA === undefined ? '–' : pointA;
    const b = pointB === null || pointB === '' || pointB === undefined ? '–' : pointB;
    const classA = Number(a) === 0 ? 'point-zero' : '';
    const classB = Number(b) === 0 ? 'point-zero' : '';
    return `<span class="point-detail">
      <span class="point-team">${escapeHtml(teamA)}</span><span class="point-value ${classA}">+${a}</span>
      <span style="color:#b4c5ba;font-weight:900">·</span>
      <span class="point-team">${escapeHtml(teamB)}</span><span class="point-value ${classB}">+${b}</span>
    </span>`;
  }

  function tournamentSetResultHtml(match) {
    const hasAnyScore = [match.set1A, match.set1B, match.set2A, match.set2B, match.set3A, match.set3B]
      .some(v => v !== null && v !== '' && v !== undefined);
    if (!hasAnyScore) return '미진행';
    const a = Number(match.setWinsA || 0);
    const b = Number(match.setWinsB || 0);
    return `${a} : ${b}`;
  }

  function getMatch(id) {
    return state.data?.allMatches?.find(match => match.id === id) || null;
  }

  function api(params={}) {
    return new Promise((resolve, reject) => {
      const callback = `__gnueVolley_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      const script = document.createElement('script');
      const query = new URLSearchParams({...params, callback});
      let timer = null;

      const cleanup = () => {
        clearTimeout(timer);
        script.remove();
        try { delete window[callback]; } catch (_) { window[callback] = undefined; }
      };

      window[callback] = (payload) => {
        cleanup();
        resolve(payload);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error('Apps Script에 연결하지 못했습니다.'));
      };

      timer = setTimeout(() => {
        cleanup();
        reject(new Error('응답 시간이 초과되었습니다. 배포 주소를 확인해 주세요.'));
      }, 18000);

      script.src = `${API_URL}?${query.toString()}`;
      document.head.appendChild(script);
    });
  }

  async function loadData(showBusy=true, silent=false) {
    if (state.loading) return;
    state.loading = true;

    if (showBusy) renderLoading();

    try {
      const payload = await api({action:'data'});
      if (!payload?.ok) throw new Error(payload?.error || '데이터를 불러오지 못했습니다.');

      state.data = payload;
      syncHero();
      render();
      return payload;

    } catch (error) {
      if (silent) {
        console.warn('자동 새로고침 실패:', error.message);
        return;
      }

      $('#main').innerHTML = `
        <div class="empty">
          <div style="font-size:28px;margin-bottom:8px">⚠️</div>
          <b>데이터를 불러오지 못했습니다.</b><br>
          <span style="font-size:12px;display:inline-block;margin-top:7px">${escapeHtml(error.message)}</span>
          <div style="margin-top:14px"><button class="button primary" onclick="window.__gnueReload()">다시 시도</button></div>
        </div>`;
      toast(error.message);

    } finally {
      state.loading = false;
    }
  }

  const AUTO_REFRESH_MS = 30000;

  function autoRefreshSafe_() {
    const modalOpen = $('#modalOverlay')?.classList.contains('show');

    // 점수 입력·공지 팝업을 보는 중에는 화면을 새로 그리지 않음
    if (document.visibilityState !== 'visible' || modalOpen || state.loading) {
      return;
    }

    loadData(false, true);
  }

  function startAutoRefresh_() {
    window.setInterval(autoRefreshSafe_, AUTO_REFRESH_MS);

    // 다른 앱을 보다가 다시 돌아왔을 때도 최신 결과를 조용히 반영
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') {
        autoRefreshSafe_();
      }
    });
  }

  function logoUrlFromConfig(config) {
    const raw = String(
      config['로고주소'] ||
      config['로고 주소'] ||
      config['로고URL'] ||
      config['로고 URL'] ||
      config['로고'] ||
      ''
    ).trim();

    if (!raw) return '';

    // Google Drive 공유 링크 / uc 링크 모두 이미지 주소로 사용할 수 있게 정리
    const fileMatch = raw.match(/\/file\/d\/([^/?]+)/);
    if (fileMatch) return `https://drive.google.com/uc?export=view&id=${fileMatch[1]}`;

    const idMatch = raw.match(/[?&]id=([^&]+)/);
    if (idMatch && raw.includes('drive.google.com')) {
      return `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
    }

    return raw;
  }

  function setBrandLogo(url) {
    const box = $('#brandLogo');
    if (!box) return;

    const fallback = box.dataset.fallback || box.innerHTML;
    box.dataset.fallback = fallback;

    if (!url) {
      box.innerHTML = fallback;
      box.classList.remove('has-logo');
      return;
    }

    const image = new Image();
    image.alt = '대회 로고';
    image.src = url;
    image.onload = () => {
      box.innerHTML = '';
      box.appendChild(image);
      box.classList.add('has-logo');
    };
    image.onerror = () => {
      box.innerHTML = fallback;
      box.classList.remove('has-logo');
    };
  }

  function syncNoticeButton() {
    const notices = state.data?.notices || [];
    const noticeBtn = $('#noticeBtn');
    const noticeCount = $('#noticeCount');

    if (!noticeBtn || !noticeCount) return;

    noticeBtn.hidden = !viewerMode;
    noticeCount.textContent = notices.length > 99 ? '99+' : String(notices.length);
    noticeCount.style.display = notices.length ? 'grid' : 'none';
  }

  function syncHero() {
    const config = state.data?.config || {};
    const title = config['대회명'] || '2026 공주교대 동문화합의 날 배구대회';

    $('#brandTitle').textContent = title;
    $('#brandSubtitle').textContent = viewerMode ? '실시간 경기 현황' : '배구대회 운영 플랫폼';
    $('#heroTitle').textContent = title;
    $('#heroSubtitle').textContent = config['일시'] || '2026.08.15.(토) 09:00';
    $('#finishedCount').textContent = state.data?.summary?.finished ?? '–';
    document.title = title;

    $('#viewerLinkBtn').hidden = viewerMode;
    $('#adminBtn').hidden = viewerMode;

    if (!viewerMode) {
      $('#adminBtn').textContent = state.adminKey ? '🔓 관리자 인증됨' : '🔐 관리자 인증';
      $('#adminBtn').className = state.adminKey ? 'button soft' : 'button primary';
    }

    setBrandLogo(logoUrlFromConfig(config));
    syncNoticeButton();
  }

  function renderLoading() {
    $('#main').innerHTML = `<div class="loading"><div class="spinner"></div>대회 데이터를 불러오는 중입니다.</div>`;
  }

  function render() {
    if (!state.data) return renderLoading();
    $$('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.page === state.page));
    if (state.page === 'dashboard') renderDashboard();
    if (state.page === 'matches') renderMatches();
    if (state.page === 'standings') renderStandings();
    if (state.page === 'tournament') renderTournament();
    if (state.page === 'guide') renderGuide();
  }

  function divisionClass(division) {
    if (division === '남자') return 'mens';
    if (division === '여자') return 'womens';
    if (division === '혼성') return 'mixed';
    return '';
  }

  function venueClass(venue) {
    const map = {
      '홍성고등학교':'venue-hongseong',
      '내포중학교':'venue-naepojung',
      '내포초등학교':'venue-naepoelementary',
      '홍북중학교':'venue-hongbukjung',
      '홍주초등학교':'venue-hongjuelementary',
      '한울초등학교':'venue-hanulelementary',
      '홍북초등학교':'venue-hongbukelementary'
    };
    return map[venue] || '';
  }

  function getMatchPalette(match) {
    const division = match?.division || '';
    const group = match?.group || '';
    if (division === '남자' && group === 'A') return { accent:'#2e78c8', soft:'#eef6ff', label:'남자 A조' };
    if (division === '남자' && group === 'B') return { accent:'#16a085', soft:'#effcf8', label:'남자 B조' };
    if (division === '남자' && group === 'C') return { accent:'#8b6fd8', soft:'#f4f0ff', label:'남자 C조' };
    if (division === '남자' && group === 'D') return { accent:'#d18a22', soft:'#fff7e8', label:'남자 D조' };
    if (division === '여자' && group === 'A') return { accent:'#d0568c', soft:'#fff2f8', label:'여자 A조' };
    if (division === '여자' && group === 'B') return { accent:'#ef6b57', soft:'#fff2ef', label:'여자 B조' };
    if (division === '혼성' && group === 'A') return { accent:'#1d9b8a', soft:'#eefcf9', label:'혼성 A조' };
    if (division === '남자') return { accent:'#1976c9', soft:'#edf7ff', label:'남자부' };
    if (division === '여자') return { accent:'#d34d8a', soft:'#fff1f7', label:'여자부' };
    if (division === '혼성') return { accent:'#149b7b', soft:'#ecfcf6', label:'혼성부' };
    return { accent:'#168746', soft:'#effaf2', label: division || '경기' };
  }

  function matchCard(match) {
    const scoreText = setScoreLine(match);
    const gymClass = venueClass(match.venue);
    const palette = getMatchPalette(match);
    const cardStyle = `--division:${palette.accent}; --division-soft:${palette.soft}; border-left:8px solid ${palette.accent}; background:linear-gradient(135deg, ${palette.soft} 0%, #fff 56%)`;
    return `
      <button class="match-card" style="${cardStyle}" data-match="${escapeHtml(match.id)}">
        <div class="match-top">
          <span class="tag ${statusClass(match.status)}"><span class="status-dot ${statusClass(match.status)}"></span>&nbsp;${escapeHtml(statusLabel(match.status))}</span>
          <span class="tag round" style="color:${palette.accent}; background:${palette.soft}; border-color:${palette.accent}33">${escapeHtml(palette.label)} · ${escapeHtml(match.stage || '예선')}</span>
        </div>
        <div class="match-teamrow">
          <span class="team">${escapeHtml(text(match.teamA,''))}</span>
          <span class="vs">VS</span>
          <span class="team right">${escapeHtml(text(match.teamB,''))}</span>
        </div>
        <div class="match-bottom">
          <span class="venue-chip ${gymClass}">🏫 ${escapeHtml(text(match.venue,''))}</span>
          <span>⏱ ${escapeHtml(text(match.datetime,''))}</span>
          <span class="scoreline" style="color:${palette.accent}">${escapeHtml(scoreText || (match.winner ? '결과 보기' : '점수 입력'))}</span>
        </div>
      </button>`;
  }

  function dashboardMatchCard(match) {
    const scoreText = setScoreLine(match);

    const palette = getMatchPalette(match);
    const cardStyle = `--division:${palette.accent}; --division-soft:${palette.soft}; border-left:8px solid ${palette.accent}; background:linear-gradient(135deg, ${palette.soft} 0%, #fff 56%)`;
    return `
      <button class="match-card" style="${cardStyle}" data-dashboard-match="${escapeHtml(match.id)}">
        <div class="match-top">
          <span class="tag ${statusClass(match.status)}"><span class="status-dot ${statusClass(match.status)}"></span>&nbsp;${escapeHtml(statusLabel(match.status))}</span>
          <span class="tag round" style="color:${palette.accent}; background:${palette.soft}; border-color:${palette.accent}33">${escapeHtml(palette.label)} · ${escapeHtml(match.stage || '예선')}</span>
        </div>
        <div class="match-teamrow">
          <span class="team">${escapeHtml(text(match.teamA,''))}</span>
          <span class="vs">VS</span>
          <span class="team right">${escapeHtml(text(match.teamB,''))}</span>
        </div>
        <div class="match-bottom">
          <span class="venue-chip ${gymClass}">🏫 ${escapeHtml(text(match.venue,''))}</span>
          <span>⏱ ${escapeHtml(text(match.datetime,''))}</span>
          <span class="scoreline" style="color:${palette.accent}">경기 운영으로 ›</span>
        </div>
      </button>`;
  }

  function goToMatch(matchId) {
    const match = getMatch(matchId);
    if (!match) return;

    state.page = 'matches';
    state.matchFilter = match.division || '전체';
    state.matchVenueFilter = match.venue || '전체';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // 페이지 이동이 먼저 보이고, 이어서 해당 경기의 상세 입력창을 열도록 함
    setTimeout(() => openMatch(matchId), 180);
  }

  function renderDashboard() {
    const data = state.data;
    const allMatches = data.allMatches || [];
    const liveRaw = data.liveMatches || [];
    const status = state.dashboardStatusFilter;
    const baseList = status === '전체'
      ? liveRaw
      : allMatches.filter(match => match.status === status);

    const venueFilters = getVenueFilters(baseList);
    const list = state.dashboardVenueFilter === '전체'
      ? baseList
      : baseList.filter(match => match.venue === state.dashboardVenueFilter);

    const statusTitle = status === '전체' ? '🏐 진행·예정 경기' : `🏐 ${status} 경기`;
    const statusHint = status === '전체'
      ? '카드를 누르면 경기 운영으로 이동'
      : '상단 요약을 누르면 상태별로 전환됩니다.';
    const finished = allMatches.filter(m => m.status === '종료').slice(-3).reverse();
    const stand = data.standings || [];

    const metrics = [
      { label:'전체 경기', count:data.summary?.total ?? 0, value:'전체', note:'예선·토너먼트 포함' },
      { label:'진행 중', count:data.summary?.live ?? 0, value:'진행중', note:'점수 입력 중' },
      { label:'종료', count:data.summary?.finished ?? 0, value:'종료', note:'결과 확정' },
      { label:'남은 경기', count:data.summary?.remaining ?? 0, value:'예정', note:'예정 경기' }
    ];

    const leaderCards = stand.map(group => {
      const palette = standingPalette(group);
      const rows = group.rows || [];
      const hasResult = rows.some(row =>
        Number(row.games || 0) > 0 ||
        Number(row.wins || 0) > 0 ||
        Number(row.losses || 0) > 0 ||
        Number(row.points || 0) > 0
      );

      const rankBox = (rank) => {
        const row = hasResult ? rows[rank - 1] : null;
        const team = row?.team || '미정';
        const record = row ? `${row.wins}승 · ${row.points}점` : '경기 전';
        const undecided = !row ? 'undecided' : '';
        return `<div class="leader-rank">
          <div class="leader-rank-head"><span class="leader-rank-num">${rank}</span>위</div>
          <div class="leader-team ${undecided}">${escapeHtml(team)}</div>
          <div class="leader-record ${undecided}">${escapeHtml(record)}</div>
        </div>`;
      };

      return `<button class="leader-card" style="--leader-accent:${palette.accent};--leader-soft:${palette.soft}" data-leader-group="${escapeHtml(group.key)}">
        <div class="leader-group-title"><span>${escapeHtml(group.label)}</span><span class="leader-open">순위 보기 ›</span></div>
        <div class="leader-ranks">${rankBox(1)}${rankBox(2)}</div>
      </button>`;
    }).join('');

    $('#main').innerHTML = `
      <div class="dashboard-summary">
        ${metrics.map(item => `<button class="metric-button ${state.dashboardStatusFilter===item.value?'active':''}" data-dashboard-status="${item.value}">
          <small>${item.label}</small><b>${item.count}</b><span>${item.note}</span>
        </button>`).join('')}
      </div>

      <div class="grid two">
        <section class="card">
          <div class="section-title"><h3>${statusTitle}</h3><small>${statusHint}</small></div>
          <div class="subtabs" style="margin-top:-2px;margin-bottom:12px">
            ${venueFilters.map(venue => `<button class="subtab ${state.dashboardVenueFilter===venue?'active':''}" data-dashboard-venue-filter="${escapeHtml(venue)}">${escapeHtml(venue)}</button>`).join('')}
          </div>
          <div class="grid dashboard-match-list">${list.length ? list.slice(0,3).map(dashboardMatchCard).join('') : '<div class="empty">선택한 조건에 표시할 경기가 없습니다.</div>'}</div>
          ${list.length > 3 ? '<button class="button soft dashboard-more" id="dashboardMoreBtn">경기 운영에서 전체 보기 →</button>' : ''}
        </section>
        <section class="card dashboard-recent">
          <div class="section-title"><h3>✅ 최근 종료 경기</h3><small>결과 확정</small></div>
          <div class="grid">${finished.length ? finished.map(matchCard).join('') : '<div class="empty">아직 종료된 경기가 없습니다.</div>'}</div>

        <div class="section-title"><h3>🏆 조별 1·2위</h3><small>점수 입력 전 조는 미정으로 표시됩니다.</small></div>
        <div class="leader-grid">${leaderCards || '<div class="empty">조별 순위 데이터가 없습니다.</div>'}</div>
      </section>`;

    $$('[data-dashboard-status]').forEach(btn => btn.onclick = () => {
      state.dashboardStatusFilter = btn.dataset.dashboardStatus;
      state.dashboardVenueFilter = '전체';
      renderDashboard();
    });
    $$('[data-dashboard-venue-filter]').forEach(btn => btn.onclick = () => {
      state.dashboardVenueFilter = btn.dataset.dashboardVenueFilter;
      renderDashboard();
    });
    $$('[data-dashboard-match]').forEach(btn => btn.onclick = () => goToMatch(btn.dataset.dashboardMatch));
    $$('[data-leader-group]').forEach(btn => btn.onclick = () => {
      const group = stand.find(item => item.key === btn.dataset.leaderGroup);
      if (!group) return;
      state.page = 'standings';
      state.standingFilter = group.division;
      state.standingGroupFilter = group.key;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    $('#dashboardMoreBtn')?.addEventListener('click', () => {
      state.page = 'matches';
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    bindMatchCards();
  }

  function getDivisionFilters(matches) {
    return ['전체', ...Array.from(new Set(matches.map(m => m.division).filter(Boolean)))];
  }

  function getVenueFilters(matches) {
    return ['전체', ...Array.from(new Set(matches.map(m => m.venue).filter(Boolean)))];
  }

  function renderMatches() {
    const all = state.data.allMatches || [];
    const filters = getDivisionFilters(all);
    const venueFilters = getVenueFilters(all);
    let list = state.matchFilter === '전체' ? all : all.filter(m => m.division === state.matchFilter);
    list = state.matchVenueFilter === '전체' ? list : list.filter(m => m.venue === state.matchVenueFilter);

    $('#main').innerHTML = `
      <div class="toolbar">

  function standingGroupClass(group) {
    const division = group?.division || '';
    const g = group?.group || '';
    if (division === '남자' && g === 'A') return 'm-a';
    if (division === '남자' && g === 'B') return 'm-b';
    if (division === '남자' && g === 'C') return 'm-c';
    if (division === '남자' && g === 'D') return 'm-d';
    if (division === '여자' && g === 'A') return 'w-a';
    if (division === '여자' && g === 'B') return 'w-b';
    if (division === '혼성' && g === 'A') return 'x-a';
    return '';
  }

  function renderStandings() {
    const groups = state.data.standings || [];
    const divisionOptions = ['전체', ...Array.from(new Set(groups.map(g => g.division)))];
    const divisionVisible = state.standingFilter === '전체'
      ? groups
      : groups.filter(g => g.division === state.standingFilter);

    const groupOptions = divisionVisible.map(group => ({
      key: group.key,
      label: group.label
    }));

    if (state.standingGroupFilter !== '전체' &&
        !groupOptions.some(option => option.key === state.standingGroupFilter)) {
      state.standingGroupFilter = '전체';
    }

    const visible = state.standingGroupFilter === '전체'
      ? divisionVisible
      : divisionVisible.filter(group => group.key === state.standingGroupFilter);

    $('#main').innerHTML = `
      <div class="section-title"><div><h3>조별 순위</h3><small>다승 → 승점 → 득실률(득점÷실점) → 총득점 → 동전 던지기</small></div><span class="tag done">종료 경기만 합산</span></div>
      <div class="subtabs">
        ${divisionOptions.map(opt => `<button class="subtab ${state.standingFilter===opt?'active':''} ${opt==='남자'?'division-mens':opt==='여자'?'division-womens':opt==='혼성'?'division-mixed':''}" data-standing-filter="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('')}
      </div>
      <div class="subtabs" style="margin-top:-5px">
        <button class="subtab ${state.standingGroupFilter==='전체'?'active':''}" data-standing-group="전체">전체 조</button>

      </div>`;

    $$('[data-standing-filter]').forEach(btn => btn.onclick = () => {
      state.standingFilter = btn.dataset.standingFilter;
      state.standingGroupFilter = '전체';
      renderStandings();
    });
    $$('[data-standing-group]').forEach(btn => btn.onclick = () => {
      state.standingGroupFilter = btn.dataset.standingGroup;
      renderStandings();

  function standingPalette(group) {
    const division = group?.division || '';
    const g = group?.group || '';

    if (division === '남자' && g === 'A') return { accent:'#2e78c8', soft:'#eef6ff', header:'#e1efff' };
    if (division === '남자' && g === 'B') return { accent:'#16a085', soft:'#effcf8', header:'#ddf7ee' };
    if (division === '남자' && g === 'C') return { accent:'#8b6fd8', soft:'#f4f0ff', header:'#ebe3ff' };
    if (division === '남자' && g === 'D') return { accent:'#d18a22', soft:'#fff7e8', header:'#ffeecf' };
    if (division === '여자' && g === 'A') return { accent:'#d0568c', soft:'#fff2f8', header:'#ffe3ef' };
    if (division === '여자' && g === 'B') return { accent:'#ef6b57', soft:'#fff2ef', header:'#ffe3dc' };
    if (division === '혼성' && g === 'A') return { accent:'#1d9b8a', soft:'#eefcf9', header:'#def7f1' };

    return { accent:'#168746', soft:'#effaf2', header:'#e4f4e9' };
  }

  function standingsTable(group) {
    const palette = standingPalette(group);
    const cardStyle = `border-top:8px solid ${palette.accent}; background:linear-gradient(180deg,${palette.soft} 0%,#fff 27%);`;
    return `<section class="card standing-card" style="${cardStyle}">
      <div class="section-title">
        <h3>${escapeHtml(group.label)}</h3>
        <span class="standing-title-badge" style="color:${palette.accent};background:${palette.soft};border-color:${palette.accent}33">${group.complete ? '예선 완료' : '예선 진행 중'}</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead style="background:${palette.header};color:${palette.accent}"><tr><th>순위</th><th>팀</th><th>승리</th><th>승점</th><th>득실률</th><th>총득점</th></tr></thead>
          <tbody>
            ${(group.rows || []).map(row => {
              const hasPlayed = Number(row.games || 0) > 0;
              const rate = hasPlayed ? Number(row.rate || 0).toFixed(2) : '–';
              const scoreRatio = hasPlayed ? `${row.scored}/${row.allowed}` : '–';
              return `<tr class="rank-${row.rank}">
                <td><span class="rank-badge ${row.rank===1?'one':''}" style="${row.rank===1 ? `background:${palette.accent}22;color:${palette.accent}` : ''}">${row.rank}</span></td>
                <td class="team-cell">${escapeHtml(row.team)}</td>
                <td><b>${row.wins}</b></td>
                <td><b>${row.points}</b></td>
                <td class="rate-cell"><b>${rate}</b><small>${scoreRatio}</small></td>
                <td><b>${hasPlayed ? row.scored : '–'}</b></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </section>`;
  }

  function renderTournament() {
    const tournament = state.data.tournament || {};
    const divisions = Object.keys(tournament);
    const defaultDivision = tournament[state.tournamentFilter] ? state.tournamentFilter : (divisions[0] || '남자');
    state.tournamentFilter = defaultDivision;
    const rounds = tournament[defaultDivision] || {};

    $('#main').innerHTML = `
      <div class="section-title">
        <div><h3>토너먼트</h3><small>우승은 상단, 결승·4강·8강은 아래로 갈라지는 대진표입니다.</small></div>
        <span class="tag round">준결승 패배팀 공동 3위</span>
      </div>
      <div class="subtabs">
        ${divisions.map(division => `<button class="subtab ${defaultDivision===division?'active':''} ${division==='남자'?'division-mens':division==='여자'?'division-womens':division==='혼성'?'division-mixed':''}" data-tournament-filter="${escapeHtml(division)}">${escapeHtml(division)}부</button>`).join('')}

  function tournamentPyramidHtml(rounds) {
    const qf = rounds['8강'] || [];
    const sf = rounds['4강'] || [];
    const finalMatch = (rounds['결승'] || [])[0];

    if (!finalMatch && !sf.length && !qf.length) {
      return '<div class="empty">아직 생성된 토너먼트가 없습니다.</div>';
    }

    const champion = finalMatch?.winner || '우승팀 대기';
    const semiHtml = sf.length ? `<div class="bracket-row semi-row">
      ${sf.map(match => `<div class="bracket-slot"><p class="bracket-round-name">4강</p>${pyramidMatchCard(match)}</div>`).join('')}
    </div>` : '';

    const qfHtml = qf.length ? `<div class="bracket-row quarter-row">
      ${qf.map(match => `<div class="bracket-slot"><p class="bracket-round-name">8강</p>${pyramidMatchCard(match)}</div>`).join('')}
    </div>` : '';

    return `<div class="bracket-board-wrap"><div class="bracket-board">
      <div class="bracket-winner"><small>🏆 우승</small>${escapeHtml(champion)}</div>
      <div class="bracket-stem"></div>
      ${finalMatch ? `<div class="bracket-row final-row"><div class="bracket-slot"><p class="bracket-round-name">결승</p>${pyramidMatchCard(finalMatch, true)}</div></div>` : ''}
      ${semiHtml}
      ${qfHtml}
    </div></div>`;
  }

  function pyramidMatchCard(match, finalCard=false) {
    const winner = match.winner || '';
    const aWin = winner && winner === match.teamA;
    const bWin = winner && winner === match.teamB;

    return `<button class="bracket-card-force ${finalCard ? 'final' : ''}" data-tournament-match="${escapeHtml(match.id)}">
      <div class="bracket-face">
        <div class="bracket-side ${aWin ? 'winner' : ''}">
          <span class="bracket-side-name">${escapeHtml(text(match.teamA,''))}</span>
          ${aWin ? '<span class="bracket-check">✓</span>' : ''}
        </div>
        <div class="bracket-vs">VS</div>
        <div class="bracket-side ${bWin ? 'winner' : ''}">
          <span class="bracket-side-name">${escapeHtml(text(match.teamB,''))}</span>
          ${bWin ? '<span class="bracket-check">✓</span>' : ''}
        </div>
      </div>
      <div class="bracket-meta"><span>🏫 ${escapeHtml(text(match.venue,''))}</span><span>⏱ ${escapeHtml(text(match.datetime,''))}</span></div>
    </button>`;
  }

        <ul class="rule-list">
          ${guide.map(item => `<li><b>${escapeHtml(item.category)}</b><span>${escapeHtml(item.content)}</span></li>`).join('') || '<li><b>대회요강을 불러오지 못했습니다.</b></li>'}
        </ul>

  function bindMatchCards() {
    $$('[data-match]').forEach(btn => btn.onclick = () => openMatch(btn.dataset.match));
  }

  function getTournamentMeta(matchId) {
    const tournament = state.data?.tournament || {};
    for (const division of Object.values(tournament)) {
      for (const round of Object.values(division)) {
        const found = (round || []).find(item => item.id === matchId);
        if (found) return found;
      }
    }
    return null;
  }

  function getEffectiveMatchMeta(match) {
    const tournamentMeta = getTournamentMeta(match.id);
    if (!tournamentMeta) {
      return {
        stage: match.stage,
        division: match.division,
        group: match.group,
        sequence: match.order ? `${match.order}경기` : '',
        venue: match.venue,
        datetime: match.datetime,
        note: match.note || ''
      };
    }
    return {
      stage: '토너먼트',
      division: tournamentMeta.division || match.division,
      group: '',
      sequence: tournamentMeta.round || '토너먼트',
      venue: tournamentMeta.venue || match.venue,
      datetime: tournamentMeta.datetime || match.datetime,
      note: match.note || ''
    };
  }

    const match = getMatch(matchId);
    if (!match) {
      const tMatch = findTournamentMatch(matchId);
      if (tMatch) return openTournamentPreview(tMatch);
      return toast('경기 정보를 찾지 못했습니다.');
    }
    state.selectedMatchId = matchId;
    const displayMeta = getEffectiveMatchMeta(match);
    const canEdit = !viewerMode && !!state.adminKey;
    $('#modalContent').innerHTML = `
      <div class="modal-head">
        <div><h3>${escapeHtml(match.teamA)} <span style="color:#95a89e;font-size:14px">VS</span> ${escapeHtml(match.teamB)}</h3>
        <p>${escapeHtml(displayMeta.stage)} · ${escapeHtml(displayMeta.division)}${displayMeta.group ? ' '+escapeHtml(displayMeta.group)+'조' : ''}${displayMeta.sequence ? ' · '+escapeHtml(displayMeta.sequence) : ''} · 🏫 ${escapeHtml(text(displayMeta.venue,''))} · ⏱ ${escapeHtml(text(displayMeta.datetime,''))}${displayMeta.note ? ' · '+escapeHtml(displayMeta.note) : ''}</p></div>
        <button class="x" id="closeModal">×</button>

      </div>
      <div class="score-panel">

          <span class="tag ${statusClass(match.status)}" id="modalBadge">${escapeHtml(statusLabel(match.status))}</span>
        </div>
        ${scoreInputRow('1세트', 's1a','s1b', match.set1A, match.set1B, match.teamA, match.teamB, canEdit)}
        ${scoreInputRow('2세트', 's2a','s2b', match.set2A, match.set2B, match.teamA, match.teamB, canEdit)}
        ${scoreInputRow('3세트', 's3a','s3b', match.set3A, match.set3B, match.teamA, match.teamB, canEdit, true)}
        <div class="score-preview" id="scorePreview"></div>
      </div>
      ${!canEdit ? `<p class="login-note">${viewerMode ? '관전자 화면에서는 점수를 수정할 수 없습니다.' : '점수를 수정하려면 상단의 관리자 인증 버튼을 누르고 키를 입력하세요.'}</p>` : ''}
      <div class="modal-actions">
        ${canEdit && match.status !== '예정' ? `<button class="button danger" id="resetMatchBtn">결과 초기화</button>` : ''}

        ${canEdit ? `<button class="button primary" id="saveScoreBtn">점수 저장</button>` : ''}

  function scoreInputRow(label, ida, idb, a, b, teamA, teamB, editable, third=false) {
    const setKey = ida.replace(/a$/i,'');
    return `<div class="set-block">
      <div class="set-head">
        <span class="set-title">${label}</span>
        <span class="set-winner-badge" id="${setKey}WinnerBadge">승자 미정</span>
      </div>
      <div class="set-teams">
        <span class="set-team-name">${escapeHtml(teamA)}</span>
        <span class="set-vs-mini">VS</span>
        <span class="set-team-name right">${escapeHtml(teamB)}</span>
      </div>
      <div class="score-input-grid">
        <span></span>
        <input class="score-input" id="${ida}" inputmode="numeric" min="0" type="number" value="${a ?? ''}" ${editable?'':'disabled'}>
        <input class="score-input" id="${idb}" inputmode="numeric" min="0" type="number" value="${b ?? ''}" ${editable?'':'disabled'}>
        <span></span>
      </div>
    </div>`;

  function updateMatchPreview() {
    const match = getMatch(state.selectedMatchId);
    if (!match) return;
    const c = calcMatchFromInputs(match);

    const setMeta = [
      { key:'s1', label:'1세트', winner:c.setWinners[0], a:c.s1a, b:c.s1b },
      { key:'s2', label:'2세트', winner:c.setWinners[1], a:c.s2a, b:c.s2b },
      { key:'s3', label:'3세트', winner:c.setWinners[2], a:c.s3a, b:c.s3b }
    ];

    setMeta.forEach(item => {
      const badge = document.getElementById(item.key + 'WinnerBadge');
      if (!badge) return;

      const hasScore = Number.isFinite(item.a) || Number.isFinite(item.b);
      const notPlayed = c.status === '종료' && !hasScore && !item.winner;

      if (notPlayed) {
        badge.textContent = '미실시';
        badge.className = 'set-winner-badge skipped';
        return;
      }

      const winnerName = item.winner === 'A' ? match.teamA : item.winner === 'B' ? match.teamB : '진행중';
      badge.textContent = item.winner ? `🎖️ ${winnerName}` : winnerName;
      badge.className = 'set-winner-badge ' + (item.winner ? 'done' : 'live');
    });

    const summary = setMeta.map(item => {
      const hasScore = Number.isFinite(item.a) || Number.isFinite(item.b);
      const notPlayed = c.status === '종료' && !hasScore && !item.winner;

      if (notPlayed) {
        return `<span class="preview-chip skipped">${item.label} · 미실시</span>`;
      }

      const winnerName = item.winner === 'A' ? match.teamA : item.winner === 'B' ? match.teamB : '진행 중';
      return `<span class="preview-chip ${item.winner ? 'done' : 'live'}">${item.label} 🎖️ ${escapeHtml(winnerName)}</span>`;
    }).join('') + `<span class="preview-chip ${c.status==='종료'?'done':'live'}">세트 ${c.setWinsA} : ${c.setWinsB} · ${c.status}</span>`;

    $('#scorePreview').innerHTML = summary;
    $('#modalStatus').textContent = c.status;
    $('#modalWinner').textContent = c.winner || '미확정';
    $('#modalPoints').innerHTML = pointDetailHtml(match.teamA, c.pointsA, match.teamB, c.pointsB);
    const badge = $('#modalBadge');
    badge.textContent = c.status;
    badge.className = `tag ${statusClass(c.status)}`;
  }

  async function saveMatch() {
    const match = getMatch(state.selectedMatchId);
    if (!match || !state.adminKey) return openAdminModal();
    const c = calcMatchFromInputs(match);
    const payload = {
      action:'saveMatch', adminKey:state.adminKey, id:match.id,
      s1a: valueOrBlank(c.s1a), s1b:valueOrBlank(c.s1b),
      s2a: valueOrBlank(c.s2a), s2b:valueOrBlank(c.s2b),
      s3a: valueOrBlank(c.s3a), s3b:valueOrBlank(c.s3b)
    };
    setModalBusy(true, '저장 중…');
    try {
      const result = await api(payload);
      if (!result?.ok) throw new Error(result?.error || '저장하지 못했습니다.');
      state.data = result;
      syncHero();
      closeModal();
      render();
      toast('경기 결과를 저장하고 순위를 갱신했습니다.');
    } catch (error) {
      toast(error.message);
      setModalBusy(false, '점수 저장');
    }
  }

  function valueOrBlank(v) {
    return Number.isFinite(v) ? v : '';
  }

  async function resetMatch() {
    const match = getMatch(state.selectedMatchId);
    if (!match || !state.adminKey) return;
    if (!confirm(`${match.teamA} vs ${match.teamB} 경기 결과를 초기화할까요?`)) return;
    setModalBusy(true, '초기화 중…');
    try {
      const result = await api({action:'resetMatch', adminKey:state.adminKey, id:match.id});
      if (!result?.ok) throw new Error(result?.error || '초기화하지 못했습니다.');
      state.data = result;
      syncHero();
      closeModal();
      render();
      toast('경기 결과를 초기화했습니다.');
    } catch (error) {
      toast(error.message);
      setModalBusy(false, '결과 초기화');
    }
  }

  function setModalBusy(disabled, label) {
    const save = $('#saveScoreBtn');
    const reset = $('#resetMatchBtn');
    if (save) { save.disabled = disabled; save.textContent = label || '점수 저장'; }
    if (reset) reset.disabled = disabled;
  }

  function findTournamentMatch(id) {
    for (const division of Object.values(state.data?.tournament || {})) {
      for (const round of Object.values(division)) {
        const item = round.find(m => m.id === id);
        if (item) return item;
      }
    }
    return null;
  }

  function openTournamentPreview(match) {
    $('#modalContent').innerHTML = `
      <div class="modal-head"><div><h3>${escapeHtml(match.teamA || '진출팀 대기')} VS ${escapeHtml(match.teamB || '진출팀 대기')}</h3>
      <p>${escapeHtml(match.round)} · 🏫 ${escapeHtml(text(match.venue,''))} · ⏱ ${escapeHtml(text(match.datetime,''))}</p></div>
      <button class="x" id="closeModal">×</button></div>
      <div class="card" style="box-shadow:none;background:#f7fff9"><b>현재 상태: ${escapeHtml(statusLabel(match.status))}</b>
      <p style="margin:9px 0 0;color:var(--muted);font-size:13px;font-weight:700">예선 순위와 앞 경기 승자가 확정되면 실제 팀명이 자동으로 표시됩니다.</p></div>
      <div class="modal-actions"><button class="button line" id="closeModal2">닫기</button></div>`;
    showModal();
    $('#closeModal').onclick = closeModal;
    $('#closeModal2').onclick = closeModal;
  }

  function showModal() {
    $('#modalOverlay').classList.add('show');
  }
  function closeModal() {
    $('#modalOverlay').classList.remove('show');
    state.selectedMatchId = null;
  }

  async function syncNow() {
    if (!state.adminKey) return openAdminModal();
    const button = $('#syncBtn');
    if (button) { button.disabled = true; button.textContent = '갱신 중…'; }
    try {
      const result = await api({action:'sync', adminKey:state.adminKey});
      if (!result?.ok) throw new Error(result?.error || '갱신하지 못했습니다.');
      state.data = result;
      syncHero();
      render();
      toast('시트·순위·토너먼트를 갱신했습니다.');
    } catch (error) {
      toast(error.message);
      if (button) { button.disabled = false; button.textContent = '↻ 시트 전체 갱신'; }
    }
  }

  function openAdminModal() {
    if (viewerMode) return toast('관전자 화면에서는 관리자 인증을 사용할 수 없습니다.');
    $('#modalContent').innerHTML = `
      <div class="modal-head"><div><h3>관리자 인증</h3><p>점수 입력과 전체 갱신을 위한 관리자 키입니다.</p></div><button class="x" id="closeModal">×</button></div>
      <p class="login-note">Code.gs 상단의 <b>ADMIN_KEY</b>에 설정한 값을 입력하세요. 이 브라우저에만 저장됩니다.</p>
      <label class="field-label" for="adminKeyInput">관리자 키</label>
      <input class="text-input" id="adminKeyInput" type="password" placeholder="관리자 키 입력" value="${escapeHtml(state.adminKey)}" autocomplete="current-password">
      <div class="modal-actions">
        ${state.adminKey ? '<button class="button danger" id="logoutBtn">인증 해제</button>' : ''}
        <button class="button line" id="closeModal2">닫기</button>
        <button class="button primary" id="saveAdminKey">인증하기</button>
      </div>`;
    showModal();
    $('#closeModal').onclick = closeModal;
    $('#closeModal2').onclick = closeModal;
    $('#saveAdminKey').onclick = () => {
      const key = $('#adminKeyInput').value.trim();
      if (!key) return toast('관리자 키를 입력하세요.');
      state.adminKey = key;
      localStorage.setItem('gnueVolleyAdminKey', key);
      syncHero();
      closeModal();
      toast('관리자 키를 저장했습니다.');
    };
    $('#logoutBtn')?.addEventListener('click', () => {
      state.adminKey = '';
      localStorage.removeItem('gnueVolleyAdminKey');
      syncHero();
      closeModal();
      toast('관리자 인증을 해제했습니다.');
    });
    setTimeout(() => $('#adminKeyInput')?.focus(), 80);
  }

  function toast(message) {
    const el = $('#toast');
    el.textContent = message;
    el.classList.add('show');
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => el.classList.remove('show'), 2700);
  }

  function copyViewerLink() {
    const url = new URL(location.href);
    url.searchParams.set('viewer','true');
    navigator.clipboard?.writeText(url.toString())
      .then(() => toast('관전자 링크를 복사했습니다.'))
      .catch(() => prompt('이 주소를 복사하세요.', url.toString()));
  }

  $('#tabs').addEventListener('click', event => {
    const tab = event.target.closest('[data-page]');
    if (!tab) return;
    state.page = tab.dataset.page;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  $('#refreshBtn').onclick = () => loadData(true);
  $('#viewerLinkBtn').onclick = copyViewerLink;
  $('#adminBtn').onclick = () => openAdminModal();
  $('#noticeBtn').onclick = openNoticeModal;
  $('#modalOverlay').addEventListener('click', event => {
    if (event.target.id === 'modalOverlay') closeModal();
  });
  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') closeModal();
  });

  window.__gnueReload = () => loadData(true);
  loadData(true);
  startAutoRefresh_();
})();
</script>
</body>
</html>
